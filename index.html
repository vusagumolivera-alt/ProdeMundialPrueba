<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial - Mi San Isidro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --verde-isidro: #528D6B;
            --verde-oscuro: #3a6349;
            --verde-claro: #6ba585;
            --dorado: #FFD700;
            --plata: #C0C0C0;
            --bronce: #CD7F32;
            --fondo: #0f1419;
            --card-bg: #1a2028;
            --texto: #ffffff;
            --texto-sec: #a8b3c1;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--fondo) 0%, #1a2530 100%);
            color: var(--texto);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(82, 141, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(82, 141, 107, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container {
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out;
        }

        .logo {
            max-width: 400px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 20px rgba(82, 141, 107, 0.3));
        }

        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin: 20px 0;
            background: linear-gradient(135deg, var(--verde-isidro), var(--verde-claro));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(82, 141, 107, 0.5);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 10px rgba(82, 141, 107, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(82, 141, 107, 0.6)); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--texto-sec);
            font-weight: 400;
        }

        .next-match {
            background: linear-gradient(135deg, var(--card-bg), rgba(82, 141, 107, 0.1));
            border: 2px solid var(--verde-isidro);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            text-align: center;
            animation: fadeIn 1s ease-out 0.2s both;
            box-shadow: 0 8px 32px rgba(82, 141, 107, 0.2);
            position: relative;
            overflow: hidden;
        }

        .next-match::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(82, 141, 107, 0.1) 50%,
                transparent 70%
            );
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .next-match-label {
            font-size: 0.9rem;
            color: var(--verde-claro);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .next-match-info {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--texto);
            position: relative;
            z-index: 1;
        }

        .whatsapp-button {
            display: inline-block;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 20px 0 40px;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out 0.4s both, pulse 2s ease-in-out infinite;
        }

        .whatsapp-button::before {
            content: '💬';
            margin-right: 10px;
            font-size: 1.3rem;
        }

        .whatsapp-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(37, 211, 102, 0.6);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); }
            50% { box-shadow: 0 8px 35px rgba(37, 211, 102, 0.7); }
        }

        .podium {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .podium-card {
            background: linear-gradient(135deg, var(--card-bg), rgba(82, 141, 107, 0.05));
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            border: 2px solid;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            animation: slideUp 0.8s ease-out both;
        }

        .podium-card:nth-child(1) {
            animation-delay: 0.7s;
            border-color: var(--dorado);
            grid-column: 1 / 2;
            margin-top: 0;
        }

        .podium-card:nth-child(2) {
            animation-delay: 0.8s;
            border-color: var(--plata);
            grid-column: 2 / 3;
            margin-top: 20px;
        }

        .podium-card:nth-child(3) {
            animation-delay: 0.9s;
            border-color: var(--bronce);
            grid-column: 3 / 4;
            margin-top: 40px;
        }

        .podium-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 50px rgba(82, 141, 107, 0.3);
        }

        .medal {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: rotate 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .position-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .podium-card:nth-child(1) .position-badge {
            background: linear-gradient(135deg, var(--dorado), #FFA500);
        }

        .podium-card:nth-child(2) .position-badge {
            background: linear-gradient(135deg, var(--plata), #808080);
        }

        .podium-card:nth-child(3) .position-badge {
            background: linear-gradient(135deg, var(--bronce), #8B4513);
        }

        .participant-name {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--texto);
        }

        .participant-secretaria {
            font-size: 0.9rem;
            color: var(--texto-sec);
            margin-bottom: 15px;
            font-weight: 400;
        }

        .points {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--verde-isidro), var(--verde-claro));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .points-label {
            font-size: 0.8rem;
            color: var(--texto-sec);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ranking-list {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-out 1s both;
        }

        .ranking-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            margin-bottom: 25px;
            color: var(--verde-claro);
            letter-spacing: 2px;
            border-bottom: 2px solid var(--verde-isidro);
            padding-bottom: 15px;
        }

        .ranking-item {
            display: grid;
            grid-template-columns: 60px 2fr 2fr 1fr;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(82, 141, 107, 0.05), transparent);
            border-radius: 12px;
            margin-bottom: 10px;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            animation: fadeInUp 0.5s ease-out both;
        }

        .ranking-item:nth-child(even) {
            background: linear-gradient(135deg, transparent, rgba(82, 141, 107, 0.03));
        }

        .ranking-item:hover {
            background: linear-gradient(135deg, rgba(82, 141, 107, 0.15), rgba(82, 141, 107, 0.05));
            border-color: var(--verde-isidro);
            transform: translateX(5px);
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--verde-claro);
            text-align: center;
        }

        .rank-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .rank-secretaria {
            color: var(--texto-sec);
            font-size: 0.95rem;
        }

        .rank-points {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--verde-claro);
            text-align: right;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.3rem;
            color: var(--texto-sec);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid rgba(220, 38, 38, 0.5);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: #fca5a5;
            text-align: center;
        }

        .last-update {
            text-align: center;
            color: var(--texto-sec);
            font-size: 0.9rem;
            margin-top: 30px;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .podium {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .podium-card {
                margin-top: 0 !important;
            }

            .ranking-item {
                grid-template-columns: 50px 1fr;
                gap: 10px;
            }

            .rank-secretaria {
                grid-column: 2 / 3;
                font-size: 0.85rem;
            }

            .rank-points {
                grid-column: 2 / 3;
                text-align: left;
                margin-top: 5px;
            }

            .logo {
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ID del Google Sheets (extraído de la URL)
        const SHEET_ID = '1b82-tDyhZRPxKr_zsM1UUt4UhUC0DgtT7nuXM5_2rag';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        function App() {
            const [participants, setParticipants] = useState([]);
            const [nextMatch, setNextMatch] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);

            const fetchData = async () => {
                try {
                    setError(null);
                    const response = await fetch(CSV_URL);
                    const csvText = await response.text();
                    
                    // Parsear CSV
                    const lines = csvText.split('\n').filter(line => line.trim());
                    
                    if (lines.length === 0) {
                        throw new Error('El archivo está vacío');
                    }

                    // Primera línea contiene headers y el próximo partido
                    const headers = lines[0].split(',');
                    const nextMatchInfo = headers[3] ? headers[3].replace(/"/g, '').trim() : '';
                    setNextMatch(nextMatchInfo || 'Próximamente se anunciarán los partidos');

                    // Procesar participantes (desde línea 2 en adelante)
                    const participantsList = [];
                    for (let i = 1; i < lines.length; i++) {
                        const columns = lines[i].split(',').map(col => col.replace(/"/g, '').trim());
                        
                        if (columns.length >= 3 && columns[0]) {
                            participantsList.push({
                                nombre: columns[0],
                                secretaria: columns[1] || 'Sin secretaría',
                                puntos: parseInt(columns[2]) || 0
                            });
                        }
                    }

                    // Ordenar por puntos (mayor a menor)
                    participantsList.sort((a, b) => b.puntos - a.puntos);
                    
                    setParticipants(participantsList);
                    setLastUpdate(new Date());
                    setLoading(false);
                } catch (err) {
                    console.error('Error al cargar datos:', err);
                    setError('No se pudieron cargar los datos. Verificá que el Excel esté público.');
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                
                // Auto-refresh cada 2 minutos
                const interval = setInterval(() => {
                    fetchData();
                }, 120000);

                return () => clearInterval(interval);
            }, []);

            const getMedal = (index) => {
                const medals = ['🥇', '🥈', '🥉'];
                return medals[index] || '';
