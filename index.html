<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - San Isidro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: #fff;
            padding: 24px 32px;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: #e8f5e9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .title-text h3 {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .title-text h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .status-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
        }

        .match-info {
            background: #f0f7f0;
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .match-info-icon {
            font-size: 20px;
        }

        .match-info-text {
            font-size: 14px;
            color: #2e7d32;
            font-weight: 500;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 32px;
        }

        .stat-card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 20px;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .stat-value.green {
            color: #2e7d32;
        }

        .stat-suffix {
            font-size: 18px;
            color: #666;
            margin-left: 4px;
        }

        /* Search */
        .search-section {
            padding: 0 32px 24px;
        }

        .search-box {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        /* Table */
        .table-container {
            padding: 0 32px 32px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        thead {
            background: #f9f9f9;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e5e5e5;
        }

        th:first-child {
            border-radius: 8px 0 0 0;
        }

        th:last-child {
            border-radius: 0 8px 0 0;
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        tbody tr.podium-1 {
            background: #fff9e6;
        }

        tbody tr.podium-2 {
            background: #f5f5f5;
        }

        tbody tr.podium-3 {
            background: #fff3e0;
        }

        td {
            padding: 16px;
            font-size: 15px;
            color: #333;
        }

        .rank-cell {
            width: 60px;
            font-weight: 600;
            color: #999;
        }

        .rank-medal {
            font-size: 24px;
        }

        .employee-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
        }

        .avatar.gold {
            background: #ffd700;
            color: #b8860b;
        }

        .avatar.silver {
            background: #c0c0c0;
            color: #666;
        }

        .avatar.bronze {
            background: #cd7f32;
            color: #fff;
        }

        .employee-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .area-cell {
            color: #666;
        }

        .points-cell {
            font-weight: 700;
            font-size: 16px;
            color: #2e7d32;
        }

        .exact-cell {
            text-align: center;
            font-weight: 600;
            color: #666;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #25d366;
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 1000;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4caf50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error */
        .error {
            text-align: center;
            padding: 40px 20px;
            color: #d32f2f;
        }

        .error-details {
            margin-top: 16px;
            padding: 16px;
            background: #ffebee;
            border-radius: 8px;
            font-size: 14px;
            text-align: left;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
            }

            .header {
                padding: 20px;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 20px;
            }

            .search-section,
            .table-container {
                padding: 20px;
            }

            table {
                font-size: 14px;
            }

            .employee-cell {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .whatsapp-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div class="spinner"></div>
            <p>Cargando ranking...</p>
        </div>
    </div>

    <a href="https://whatsapp.com/channel/0029VbAh4uIDp2QAfEVLmO3j" target="_blank" class="whatsapp-btn">
        <span>📱</span>
        Canal de WhatsApp
    </a>

    <script>
        // Configuración - NUEVO GOOGLE SHEET
        const SHEET_ID = '1jfYwBqstlcMzPKq2dZfqHrfctbsjoY2xcQZrfkpzPJE';
        
        // Usar proxy CORS para evitar bloqueos del navegador
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
        const PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL)}`;

        let allParticipants = [];
        let filteredParticipants = [];
        let matchInfo = '';
        let lastUpdate = null;

        // Función para obtener iniciales
        function getInitials(name) {
            const parts = name.trim().split(' ');
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return name.substring(0, 2).toUpperCase();
        }

        // Función para obtener medalla
        function getMedal(index) {
            const medals = ['🥇', '🥈', '🥉'];
            return medals[index] || '';
        }

        // Función para obtener clase de avatar
        function getAvatarClass(index) {
            if (index === 0) return 'gold';
            if (index === 1) return 'silver';
            if (index === 2) return 'bronze';
            return '';
        }

        // Función para obtener clase de fila del podio
        function getPodiumClass(index) {
            if (index === 0) return 'podium-1';
            if (index === 1) return 'podium-2';
            if (index === 2) return 'podium-3';
            return '';
        }

        // Función para formatear fecha
        function formatDate(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `Hoy ${hours}:${minutes}`;
        }

        // Función para parsear CSV correctamente (maneja comas dentro de comillas)
        function parseCSV(text) {
            const lines = [];
            const rows = text.split('\n');
            
            for (let row of rows) {
                if (!row.trim()) continue;
                
                const cols = [];
                let current = '';
                let inQuotes = false;
                
                for (let i = 0; i < row.length; i++) {
                    const char = row[i];
                    
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cols.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                cols.push(current.trim());
                lines.push(cols);
            }
            
            return lines;
        }

        // Función para cargar datos
        async function loadData() {
            try {
                console.log('Intentando cargar datos del nuevo Excel...');
                
                const response = await fetch(PROXY_URL);
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const text = await response.text();
                console.log('Datos recibidos:', text.substring(0, 200) + '...');
                
                const lines = parseCSV(text);
                console.log('Líneas parseadas:', lines.length);

                if (lines.length < 2) {
                    throw new Error('El Excel está vacío o no tiene datos');
                }

                // Línea 1: Headers (D1 tiene info del partido)
                const headers = lines[0];
                matchInfo = headers[3] || '';
                console.log('Info del partido:', matchInfo);

                // Parsear participantes
                const participants = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i];
                    
                    if (cols[0] && cols[2]) {
                        participants.push({
                            nombre: cols[0],
                            secretaria: cols[1] || 'Sin área',
                            puntos: parseInt(cols[2]) || 0,
                            exactos: parseInt(cols[3]) || 0
                        });
                    }
                }

                console.log('Participantes encontrados:', participants.length);

                // Ordenar por puntos
                participants.sort((a, b) => b.puntos - a.puntos);

                allParticipants = participants;
                filteredParticipants = [...participants];
                lastUpdate = new Date();

                renderApp();
            } catch (error) {
                console.error('Error completo:', error);
                renderError(error.message, error.stack);
            }
        }

        // Función para filtrar
        function filterParticipants(searchTerm) {
            const term = searchTerm.toLowerCase().trim();
            if (!term) {
                filteredParticipants = [...allParticipants];
            } else {
                filteredParticipants = allParticipants.filter(p => 
                    p.nombre.toLowerCase().includes(term) ||
                    p.secretaria.toLowerCase().includes(term)
                );
            }
            renderTable();
        }

        // Renderizar app completa
        function renderApp() {
            const maxPoints = allParticipants.length > 0 ? allParticipants[0].puntos : 0;
            const totalMatches = 48;
            const playedMatches = 18;

            document.getElementById('root').innerHTML = `
                <div class="container">
                    <!-- Header -->
                    <div class="header">
                        <div class="header-top">
                            <div class="header-title">
                                <div class="icon-box">⚽</div>
                                <div class="title-text">
                                    <h3>MUNICIPIO DE SAN ISIDRO</h3>
                                    <h1>Prode Mundial 2026</h1>
                                </div>
                            </div>
                            <div class="status-badge">
                                <span class="status-dot"></span>
                                En vivo
                            </div>
                        </div>
                        ${matchInfo ? `
                        <div class="match-info">
                            <span class="match-info-icon">⚽</span>
                            <span class="match-info-text">${matchInfo}</span>
                        </div>
                        ` : ''}
                    </div>

                    <!-- Stats -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Participantes</div>
                            <div class="stat-value">${allParticipants.length}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Puntaje líder</div>
                            <div class="stat-value green">${maxPoints}<span class="stat-suffix">pts</span></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Partidos</div>
                            <div class="stat-value">${playedMatches}<span class="stat-suffix">/ ${totalMatches}</span></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Última actualización</div>
                            <div class="stat-value" style="font-size: 20px;">${formatDate(lastUpdate)}</div>
                        </div>
                    </div>

                    <!-- Search -->
                    <div class="search-section">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input 
                                type="text" 
                                class="search-input" 
                                placeholder="Buscar por nombre o área..."
                                oninput="filterParticipants(this.value)"
                            >
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="table-container">
                        <table id="ranking-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>EMPLEADO</th>
                                    <th>ÁREA</th>
                                    <th>PTS</th>
                                    <th>EXACTO</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            renderTable();
        }

        // Renderizar solo la tabla
        function renderTable() {
            const tbody = document.getElementById('table-body');
            if (!tbody) return;

            tbody.innerHTML = filteredParticipants.map((p, index) => {
                const originalIndex = allParticipants.indexOf(p);
                const medal = getMedal(originalIndex);
                const avatarClass = getAvatarClass(originalIndex);
                const rowClass = getPodiumClass(originalIndex);
                const initials = getInitials(p.nombre);

                return `
                    <tr class="${rowClass}">
                        <td class="rank-cell">
                            ${medal ? `<span class="rank-medal">${medal}</span>` : originalIndex + 1}
                        </td>
                        <td>
                            <div class="employee-cell">
                                <div class="avatar ${avatarClass}">${initials}</div>
                                <span class="employee-name">${p.nombre}</span>
                            </div>
                        </td>
                        <td class="area-cell">${p.secretaria}</td>
                        <td class="points-cell">${p.puntos}</td>
                        <td class="exact-cell">${p.exactos}</td>
                    </tr>
                `;
            }).join('');
        }

        // Renderizar error con más detalles
        function renderError(message, stack) {
            document.getElementById('root').innerHTML = `
                <div class="container">
                    <div class="error">
                        <h2>⚠️ Error al cargar datos</h2>
                        <p style="margin: 16px 0;">${message}</p>
                        <div class="error-details">
                            <strong>Posibles causas:</strong><br>
                            1. El Excel de Google no está configurado como "Público" (cualquiera con el enlace puede ver)<br>
                            2. El ID del Excel es incorrecto<br>
                            3. Problemas temporales de conexión<br><br>
                            <strong>ID del Excel actual:</strong> ${SHEET_ID}<br>
                            <strong>Verificá que el Excel esté público en:</strong><br>
                            <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" style="color: #2e7d32;">Abrir Excel en Google Sheets</a>
                        </div>
                        <button onclick="loadData()" style="margin-top: 20px; padding: 12px 24px; background: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600;">
                            Reintentar
                        </button>
                    </div>
                </div>
            `;
        }

        // Auto-refresh cada 2 minutos
        setInterval(loadData, 120000);

        // Cargar al inicio
        loadData();
    </script>
</body>
</html>
